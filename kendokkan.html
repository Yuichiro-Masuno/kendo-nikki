<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>kendokkan</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600;700;900&family=Noto+Sans+JP:wght@300;400;500&family=IM+Fell+English:ital@1&display=swap" rel="stylesheet">
<style>
:root {
  --ink:        #0e0e18;
  --ink-mid:    #2a2a3e;
  --ink-light:  #5a5a7a;
  --paper:      #f2ece0;
  --paper-warm: #e8dfc8;
  --gold:       #c8a84b;
  --gold-dim:   rgba(200,168,75,0.18);
  --red:        #7a1e1e;
  --white:      #fdf9f2;
  --shadow:     rgba(14,14,24,0.22);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow-x: hidden; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--ink);
  color: var(--paper);
  min-height: 100vh;
  position: relative;
}

/* ── 背景装飾 ── */
.bg-layer {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.bg-circle {
  position: absolute;
  border-radius: 50%;
  opacity: 0.04;
  background: var(--gold);
}
.bg-circle:nth-child(1) { width: 600px; height: 600px; top: -120px; right: -180px; }
.bg-circle:nth-child(2) { width: 400px; height: 400px; bottom: 60px; left: -140px; }
.bg-line {
  position: absolute;
  width: 1px;
  background: linear-gradient(to bottom, transparent, var(--gold), transparent);
  opacity: 0.12;
}
.bg-line:nth-child(3) { height: 100%; left: 20%; top: 0; }
.bg-line:nth-child(4) { height: 100%; left: 80%; top: 0; }
.bg-grain {
  position: absolute;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity: 0.03;
  background-size: 180px;
}

/* ── メインラッパー ── */
.wrap {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 20px 60px;
}

/* ── ヘッダー ── */
header {
  width: 100%;
  max-width: 640px;
  padding: 48px 0 32px;
  text-align: center;
  position: relative;
}
.header-kana {
  font-size: 0.7rem;
  letter-spacing: 0.45em;
  color: var(--gold);
  font-family: 'Noto Serif JP', serif;
  font-weight: 300;
  margin-bottom: 10px;
  opacity: 0.85;
}
.header-title {
  font-family: 'Noto Serif JP', serif;
  font-size: clamp(2.4rem, 10vw, 3.6rem);
  font-weight: 900;
  letter-spacing: 0.08em;
  color: var(--white);
  line-height: 1;
  margin-bottom: 6px;
  text-shadow: 0 0 60px rgba(200,168,75,0.15);
}
.header-title span {
  color: var(--gold);
}
.header-sub {
  font-size: 0.72rem;
  color: var(--ink-light);
  letter-spacing: 0.2em;
  font-weight: 300;
}
.header-divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 28px 0 0;
}
.header-divider::before,
.header-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(to right, transparent, var(--gold), transparent);
  opacity: 0.35;
}
.header-divider-icon {
  color: var(--gold);
  font-size: 1rem;
  opacity: 0.6;
}

/* ── カードグリッド ── */
.cards {
  width: 100%;
  max-width: 640px;
  display: grid;
  grid-template-columns: 1fr;
  gap: 14px;
  margin-top: 36px;
}

/* ── アプリカード ── */
.app-card {
  position: relative;
  display: block;
  text-decoration: none;
  background: var(--ink-mid);
  border: 1px solid rgba(200,168,75,0.14);
  border-radius: 12px;
  padding: 22px 20px 20px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
  animation: cardIn 0.55s ease both;
}
.app-card:nth-child(1) { animation-delay: 0.05s; }
.app-card:nth-child(2) { animation-delay: 0.15s; }
.app-card:nth-child(3) { animation-delay: 0.25s; }

@keyframes cardIn {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}

.app-card:hover {
  transform: translateY(-3px);
  border-color: rgba(200,168,75,0.45);
  box-shadow: 0 8px 32px rgba(0,0,0,0.35), 0 0 0 1px rgba(200,168,75,0.12) inset;
}
.app-card:active {
  transform: translateY(-1px);
}

/* カード背景グロー */
.app-card::before {
  content: '';
  position: absolute;
  top: -40px;
  right: -40px;
  width: 160px;
  height: 160px;
  border-radius: 50%;
  opacity: 0;
  transition: opacity 0.3s ease;
  pointer-events: none;
}
.app-card:hover::before { opacity: 1; }
.card-keikolog::before  { background: radial-gradient(circle, rgba(122,30,30,0.25), transparent 70%); }
.card-senjin::before    { background: radial-gradient(circle, rgba(200,168,75,0.2), transparent 70%); }
.card-shinai::before    { background: radial-gradient(circle, rgba(30,80,122,0.25), transparent 70%); }

/* カード大型文字背景 */
.card-bg-char {
  position: absolute;
  right: 16px;
  bottom: -10px;
  font-family: 'Noto Serif JP', serif;
  font-size: 5.5rem;
  font-weight: 900;
  line-height: 1;
  opacity: 0.04;
  pointer-events: none;
  color: var(--white);
  transition: opacity 0.3s ease, transform 0.3s ease;
  user-select: none;
}
.app-card:hover .card-bg-char {
  opacity: 0.08;
  transform: scale(1.05);
}

/* カードアイコン */
.card-icon-wrap {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}
.card-icon {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
  flex-shrink: 0;
}
.card-keikolog .card-icon  { background: rgba(122,30,30,0.3); border: 1px solid rgba(122,30,30,0.5); }
.card-senjin .card-icon    { background: rgba(200,168,75,0.15); border: 1px solid rgba(200,168,75,0.35); }
.card-shinai .card-icon    { background: rgba(30,80,122,0.3); border: 1px solid rgba(30,80,122,0.5); }

.card-app-name {
  font-size: 0.65rem;
  letter-spacing: 0.25em;
  color: var(--ink-light);
  font-weight: 400;
}

/* カードタイトル */
.card-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 1.35rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  color: var(--white);
  margin-bottom: 6px;
  line-height: 1.3;
}
.card-keikolog .card-title-accent { color: #d06060; }
.card-senjin .card-title-accent   { color: var(--gold); }
.card-shinai .card-title-accent   { color: #5a9fd6; }

/* カード説明 */
.card-desc {
  font-size: 0.78rem;
  color: var(--ink-light);
  line-height: 1.65;
  font-weight: 300;
}

/* カードフッター */
.card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 14px;
  padding-top: 12px;
  border-top: 1px solid rgba(255,255,255,0.06);
}
.card-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.card-tag {
  font-size: 0.62rem;
  padding: 2px 8px;
  border-radius: 8px;
  background: rgba(255,255,255,0.05);
  color: var(--ink-light);
  letter-spacing: 0.05em;
}
.card-arrow {
  color: var(--gold);
  font-size: 1rem;
  opacity: 0.6;
  transition: opacity 0.2s, transform 0.2s;
}
.app-card:hover .card-arrow {
  opacity: 1;
  transform: translateX(4px);
}

/* ── フッター ── */
footer {
  margin-top: 48px;
  text-align: center;
  font-size: 0.65rem;
  color: var(--ink-light);
  letter-spacing: 0.2em;
  opacity: 0.5;
  font-family: 'Noto Serif JP', serif;
  font-weight: 300;
}
footer span { color: var(--gold); opacity: 0.7; }

/* ── アニメーション ── */
header {
  animation: fadeDown 0.6s ease both;
}
@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-12px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<div class="bg-layer">
  <div class="bg-circle"></div>
  <div class="bg-circle"></div>
  <div class="bg-line"></div>
  <div class="bg-line"></div>
  <div class="bg-grain"></div>
</div>

<div class="wrap">

  <header>
    <div class="header-title">剣道<span>日記</span></div>
    <div class="header-divider">
      <span class="header-divider-icon">⚔</span>
    </div>
  </header>

  <div class="cards">

    <!-- keikolog -->
    <a class="app-card card-keikolog" href="https://yuichiro-masuno.github.io/keikolog/keikolog.html" target="_blank">
      <div class="card-bg-char">稽</div>
      <div class="card-icon-wrap">
        <div class="card-icon">📓</div>
      </div>
      <div class="card-title"><span class="card-title-accent">稽古</span>日誌</div>
      <div class="card-footer">
        <span class="card-arrow">→</span>
      </div>
    </a>

    <!-- senjinlog -->
    <a class="app-card card-senjin" href="https://yuichiro-masuno.github.io/senjinlog/senjinlog.html" target="_blank">
      <div class="card-bg-char">先</div>
      <div class="card-icon-wrap">
        <div class="card-icon">📜</div>
      </div>
      <div class="card-title"><span class="card-title-accent">先人</span>の教え</div>
      <div class="card-footer">
        <span class="card-arrow">→</span>
      </div>
    </a>

    <!-- shinailog -->
    <a class="app-card card-shinai" href="https://yuichiro-masuno.github.io/shinailog/shinailog.html" target="_blank">
      <div class="card-bg-char">刀</div>
      <div class="card-icon-wrap">
        <div class="card-icon">🎋</div>
      </div>
      <div class="card-title"><span class="card-title-accent">竹刀</span>管理</div>
      <div class="card-footer">
        <span class="card-arrow">→</span>
      </div>
    </a>

  </div>

  <footer>
    <span>剣道日記</span>
  </footer>

</div>
</body>
</html>
